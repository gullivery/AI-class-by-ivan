<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jellyfish</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0a0a1a;
      color: #fff;
    }
    button {
      padding: 12px 24px;
      font-size: 1.1rem;
      cursor: pointer;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }
    button:active {
      transform: translateY(0);
    }
    .jellyfish-container {
      margin-top: 2rem;
      display: none;
      animation: fadeIn 0.5s ease-out;
    }
    .jellyfish-container.visible {
      display: block;
    }
    .jellyfish-container img {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <button type="button" onclick="showJellyfish()">Show Jellyfish</button>
  <div class="jellyfish-container" id="jellyfishContainer">
    <img
      src="https://images.unsplash.com/photo-1558642452-9d2a7deb7f62?w=800"
      alt="Jellyfish swimming underwater"
    />
  </div>

  <script>
    function showJellyfish() {
      document.getElementById('jellyfishContainer').classList.add('visible');
    }
  </script>
</body>
</html>
